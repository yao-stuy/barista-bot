version: "2"

linters:
  settings:
    staticcheck:
      # Mirror golangci-lint's default disabled stylechecks, plus disable
      # ST1005 so that proper nouns (e.g. "Google") are allowed at the start
      # of error strings.
      checks:
        - "all"
        - "-ST1000" # at least one file in a package should have a package comment
        - "-ST1003" # poorly chosen identifier (e.g. snake_case in Go)
        - "-ST1005" # error strings should not be capitalized
        - "-ST1016" # methods on the same type should have the same receiver name
        - "-ST1020" # comment on exported function should be of the form "Foo does X."
        - "-ST1021" # comment on exported type should be of the form "Foo is X."
        - "-ST1022" # comment on exported variable should be of the form "Foo is X."
  exclusions:
    rules:
      # motion-tools v2 (client/api) has no way to target an arbitrary viz_url:
      # its client only connects to localhost:3030 over Connect-RPC, with no
      # address/URL override. We deliberately stay on the deprecated v1
      # client/client (which honors viz_url via SetURL) until v2 exposes a
      # configurable client address. Suppress ONLY that one deprecation so every
      # other SA1019 still fails lint.
      - linters:
          - staticcheck
        text: 'SA1019: "github.com/viam-labs/motion-tools/client/client" is deprecated'
